name: pesquisadorhinos
description: Aplicativo "Qual é o hino?", nomeado também como Pesquisador de Hinos.

version: 1.2.4+17

environment:
  sdk: '>=2.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # dependencias do projeto
  sqflite: ^2.4.2
  validators: ^3.0.0
  flutter_html: ^3.0.0-beta.2
  package_info: ^2.0.2
  url_launcher: ^6.3.1
  firebase_core: ^3.11.0
  firebase_analytics: ^11.4.2
  firebase_messaging: ^15.2.2
  characters: ^1.0.0
  flutter_speed_dial: ^7.0.0
  tutorial_coach_mark: ^1.2.12
  shared_preferences: ^2.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.3

flutter_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/images/icon.png'

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/database/

  fonts:
    - family: Oxanium
      fonts:
        - asset: fonts/Oxanium-Regular.ttf
        - asset: fonts/Oxanium-Bold.ttf
          weight: 700
    - family: Raleway
      fonts:
        - asset: fonts/Raleway-Regular.ttf
        - asset: fonts/Raleway-Italic.ttf
          style: italic
        - asset: fonts/Raleway-Bold.ttf
          weight: 700
        - asset: fonts/Raleway-BoldItalic.ttf
          weight: 700
          style: italic
